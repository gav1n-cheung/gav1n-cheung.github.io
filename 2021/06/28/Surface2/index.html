s="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line">#include &lt;iostream&gt;</span><br><span class="line">#include &lt;pcl/ModelCoefficients.h&gt;</span><br><span class="line">#include &lt;pcl/point_types.h&gt;</span><br><span class="line">#include &lt;pcl/io/pcd_io.h&gt;</span><br><span class="line">#include &lt;pcl/sample_consensus/method_types.h&gt;</span><br><span class="line">#include &lt;pcl/sample_consensus/model_types.h&gt;</span><br><span class="line">#include &lt;pcl/filters/passthrough.h&gt;</span><br><span class="line">#include &lt;pcl/filters/project_inliers.h&gt;</span><br><span class="line">#include &lt;pcl/segmentation/sac_segmentation.h&gt;</span><br><span class="line">#include &lt;pcl/surface/concave_hull.h&gt;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line">int main(int argc,char** argv) &#123;</span><br><span class="line">    pcl::PointCloud&lt;pcl::PointXYZ&gt;::Ptr cloud(new pcl::PointCloud&lt;pcl::PointXYZ&gt;),</span><br><span class="line">                                        cloud_filtered(new pcl::PointCloud&lt;pcl::PointXYZ&gt;),</span><br><span class="line">                                        cloud_projected(new pcl::PointCloud&lt;pcl::PointXYZ&gt;);</span><br><span class="line">    pcl::PCDReader reader;</span><br><span class="line"></span><br><span class="line">    reader.read(&quot;table_scene_mug_stereo_textured.pcd&quot;,*cloud);</span><br><span class="line">    //建立过滤器消除杂散的NaN</span><br><span class="line">    pcl::PassThrough&lt;pcl::PointXYZ&gt; pass;</span><br><span class="line">    pass.setInputCloud(cloud);//输入点云</span><br><span class="line">    pass.setFilterFieldName(&quot;z&quot;);//过滤字段为z坐标</span><br><span class="line">    pass.setFilterLimits(0,1.1);//设置分割阈值为(0,1.1)</span><br><span class="line">    pass.filter(*cloud_filtered);//输出点云</span><br><span class="line">    //输出处理过后的点云数据的点的数量</span><br><span class="line">    std::cerr&lt;&lt;&quot;PointCloud after filtering has: &quot;</span><br><span class="line">            &lt;&lt;cloud_filtered-&gt;points.size()&lt;&lt;std::endl;</span><br><span class="line"></span><br><span class="line">    pcl::ModelCoefficients::Ptr coefficients (new pcl::ModelCoefficients);</span><br><span class="line">    pcl::PointIndices::Ptr inliers (new pcl::PointIndices);</span><br><span class="line">    //创建分割对象</span><br><span class="line">    pcl::SACSegmentation&lt;pcl::PointXYZ&gt; seg;</span><br><span class="line">    //设置优化系数为true</span><br><span class="line">    seg.setOptimizeCoefficients(true);</span><br><span class="line">    seg.setModelType(pcl::SACMODEL_PLANE);</span><br><span class="line">    seg.setModelType(pcl::SAC_RANSAC);</span><br><span class="line">    seg.setDistanceThreshold(0.01);</span><br><span class="line">    seg.setInputCloud(cloud_filtered);</span><br><span class="line">    seg.segment(*inliers,*coefficients);</span><br><span class="line">    std::cerr&lt;&lt;&quot;PointCloud after segmentation has: &quot;&lt;&lt;inliers-&gt;indices.size()</span><br><span class="line">            &lt;&lt;&quot; inliers.&quot;&lt;&lt;std::endl;</span><br><span class="line"></span><br><span class="line">    pcl::ProjectInliers&lt;pcl::PointXYZ&gt; proj;//点云投影滤波模型</span><br><span class="line">    proj.setModelType(pcl::SACMODEL_PLANE);//设置投影模型</span><br><span class="line">    proj.setIndices(inliers);</span><br><span class="line">    proj.setInputCloud(cloud_filtered);</span><br><span class="line">    proj.setModelCoefficients(coefficients);//将估计得到的平面coefficients参数设置为投影平面模型系数</span><br><span class="line">    proj.filter(*cloud_projected);//输出点云</span><br><span class="line">    std::cerr&lt;&lt;&quot;ProCloud after projection has: &quot;</span><br><span class="line">            &lt;&lt;cloud_projected-&gt;points.size()&lt;&lt;&quot; data points.&quot;&lt;&lt;std::endl;</span><br><span class="line">    //存储提取多边形上的点云</span><br><span class="line">    pcl::PointCloud&lt;pcl::PointXYZ&gt;::Ptr cloud_hull(new pcl::PointCloud&lt;pcl::PointXYZ&gt;);</span><br><span class="line">    pcl::ConcaveHull&lt;pcl::PointXYZ&gt; chull;//创建多边形提取对象</span><br><span class="line">    chull.setInputCloud(cloud_projected);//设置输入点云为提取后的点云数据</span><br><span class="line">    chull.setAlpha(0.1);</span><br><span class="line">    chull.reconstruct(*cloud_hull);//创建提取创建凹多边形</span><br><span class="line"></span><br><span class="line">    std::cerr&lt;&lt;&quot;Concave hull has:&quot;&lt;&lt;cloud_hull-&gt;points.size()</span><br><span class="line">            &lt;&lt;&quot; data points.&quot;&lt;&lt;std::endl;</span><br><span class="line">    pcl::PCDWriter writer;</span><br><span class="line">    writer.write(&quot;table.pcd&quot;,*cloud_hull, false);</span><br><span class="line"></span><br><span class="line">    return 0;</span><br><span class="line">&#125;</span><br><span class="line"></span><br></pre></td></tr></table></figure>
